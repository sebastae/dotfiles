font_size 9.0
font_family FiraCode Nerd Font Mono

# Tab-bar
tab_bar_min_tabs 1
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template {fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{'{}...'.format(title[:12]) if len(title) > 15 else title}{' [{}]'.format(num_windows) if num_windows > 1 else ''}{' ({})'.format(layout_name) if layout_name != 'splits' else ''}
active_tab_title_template {fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{title}{' [{}]'.format(num_windows) if num_windows > 1 else ''}{' ({})'.format(layout_name) if layout_name != 'splits' else ''}
